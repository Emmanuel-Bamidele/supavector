services:
  redis:
    build:
      context: .
      dockerfile: Dockerfile.redis
    image: supavector/vector-store
    restart: unless-stopped
    environment:
      VECTOR_WAL: ${VECTOR_WAL:-0}
      VECTOR_ANN_ENABLED: ${VECTOR_ANN_ENABLED:-0}
      VECTOR_ANN_LSH_TABLES: ${VECTOR_ANN_LSH_TABLES:-8}
      VECTOR_ANN_LSH_BITS: ${VECTOR_ANN_LSH_BITS:-12}
      WAL_PATH: "/data/wal.log"
    volumes:
      - vector_data:/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6379; echo PING >&3; read -r line <&3; [ \"$$line\" = \"PONG\" ]'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  vector-tls-server:
    build:
      context: .
      dockerfile: Dockerfile.stunnel
    image: supavector/stunnel
    restart: unless-stopped
    volumes:
      - ./deploy/stunnel/vector-server.conf:/etc/stunnel/stunnel.conf:ro
      # Backward-compatible default keeps existing deployments working.
      # Set STUNNEL_CERTS_DIR to an external server-only path for production.
      - ${STUNNEL_CERTS_DIR:-./deploy/certs}:/etc/stunnel/certs:ro
    depends_on:
      - redis

  vector-tls-client:
    build:
      context: .
      dockerfile: Dockerfile.stunnel
    image: supavector/stunnel
    restart: unless-stopped
    volumes:
      - ./deploy/stunnel/vector-client.conf:/etc/stunnel/stunnel.conf:ro
      - ${STUNNEL_CERTS_DIR:-./deploy/certs}:/etc/stunnel/certs:ro
    depends_on:
      - vector-tls-server

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./gateway/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.node
    image: supavector/gateway
    restart: unless-stopped
    environment:
      NODE_ENV: production
      TCP_TIMEOUT_MS: "30000"
      TCP_HOST: vector-tls-client
      TCP_PORT: "16379"

      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-${GEMINI_API:-}}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANSWER_PROVIDER: ${ANSWER_PROVIDER:-openai}
      ANSWER_MODEL: ${ANSWER_MODEL:-gpt-5.2}
      BOOLEAN_ASK_PROVIDER: ${BOOLEAN_ASK_PROVIDER:-}
      BOOLEAN_ASK_MODEL: ${BOOLEAN_ASK_MODEL:-}
      EMBED_PROVIDER: ${EMBED_PROVIDER:-openai}
      EMBED_MODEL: ${EMBED_MODEL:-text-embedding-3-large}
      REFLECT_PROVIDER: ${REFLECT_PROVIDER:-openai}
      REFLECT_MODEL: ${REFLECT_MODEL:-gpt-5-mini}
      COMPACT_PROVIDER: ${COMPACT_PROVIDER:-}
      COMPACT_MODEL: ${COMPACT_MODEL:-gpt-5-nano}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      AUTH_MAX_ATTEMPTS: ${AUTH_MAX_ATTEMPTS}
      AUTH_LOCK_MINUTES: ${AUTH_LOCK_MINUTES}
      LOGIN_RATE_LIMIT_WINDOW_MS: ${LOGIN_RATE_LIMIT_WINDOW_MS}
      LOGIN_RATE_LIMIT_MAX: ${LOGIN_RATE_LIMIT_MAX}
      MIGRATIONS_AUTO: ${MIGRATIONS_AUTO}
      MIGRATIONS_ATTEMPTS: ${MIGRATIONS_ATTEMPTS}
      MIGRATIONS_DELAY_MS: ${MIGRATIONS_DELAY_MS}
      VECTOR_SEARCH_MODE: ${VECTOR_SEARCH_MODE:-exact}
      VECTOR_ANN_ENABLED: ${VECTOR_ANN_ENABLED:-0}
      VECTOR_ANN_MIN_CANDIDATES: ${VECTOR_ANN_MIN_CANDIDATES:-5000}
      VECTOR_ANN_OVERFETCH: ${VECTOR_ANN_OVERFETCH:-5}
      VECTOR_ANN_EXACT_RESCORE: ${VECTOR_ANN_EXACT_RESCORE:-1}
      VECTOR_ANN_ROLLOUT_PERCENT: ${VECTOR_ANN_ROLLOUT_PERCENT:-100}
      VECTOR_ANN_SHADOW_SAMPLE_RATE: ${VECTOR_ANN_SHADOW_SAMPLE_RATE:-1}
      VECTOR_ANN_MIN_SHADOW_OVERLAP: ${VECTOR_ANN_MIN_SHADOW_OVERLAP:-0.8}
      VECTOR_ANN_LOW_OVERLAP_LIMIT: ${VECTOR_ANN_LOW_OVERLAP_LIMIT:-3}
      VECTOR_ANN_CIRCUIT_OPEN_MS: ${VECTOR_ANN_CIRCUIT_OPEN_MS:-300000}
      ALLOW_PRINCIPAL_OVERRIDE: ${ALLOW_PRINCIPAL_OVERRIDE:-0}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      OPENAPI_BASE_URL: ${OPENAPI_BASE_URL}
      SUPAVECTOR_DEPLOYMENT_MODE: ${SUPAVECTOR_DEPLOYMENT_MODE:-}
      SUPAVECTOR_DASHBOARD_URL: ${SUPAVECTOR_DASHBOARD_URL:-}
      COOKIE_SECRET: ${COOKIE_SECRET}
      COOKIE_SECURE: ${COOKIE_SECURE}
      FETCH_USER_AGENT: ${FETCH_USER_AGENT:-}

      OIDC_GOOGLE_CLIENT_ID: ${OIDC_GOOGLE_CLIENT_ID}
      OIDC_GOOGLE_CLIENT_SECRET: ${OIDC_GOOGLE_CLIENT_SECRET}
      OIDC_GOOGLE_ISSUER: ${OIDC_GOOGLE_ISSUER}
      OIDC_GOOGLE_TENANT_CLAIM: ${OIDC_GOOGLE_TENANT_CLAIM}
      OIDC_AZURE_CLIENT_ID: ${OIDC_AZURE_CLIENT_ID}
      OIDC_AZURE_CLIENT_SECRET: ${OIDC_AZURE_CLIENT_SECRET}
      OIDC_AZURE_ISSUER: ${OIDC_AZURE_ISSUER}
      OIDC_AZURE_TENANT_CLAIM: ${OIDC_AZURE_TENANT_CLAIM}
      OIDC_OKTA_CLIENT_ID: ${OIDC_OKTA_CLIENT_ID}
      OIDC_OKTA_CLIENT_SECRET: ${OIDC_OKTA_CLIENT_SECRET}
      OIDC_OKTA_ISSUER: ${OIDC_OKTA_ISSUER}
      OIDC_OKTA_TENANT_CLAIM: ${OIDC_OKTA_TENANT_CLAIM}

      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: ${POSTGRES_DB}
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}

      REINDEX_ON_START: ${REINDEX_ON_START}
      REINDEX_BATCH_SIZE: ${REINDEX_BATCH_SIZE}
      REINDEX_FETCH_SIZE: ${REINDEX_FETCH_SIZE}
      REINDEX_SLEEP_MS: ${REINDEX_SLEEP_MS}
      REINDEX_LOG_EVERY: ${REINDEX_LOG_EVERY}
      REINDEX_TCP_ATTEMPTS: ${REINDEX_TCP_ATTEMPTS}
      REINDEX_TCP_DELAY_MS: ${REINDEX_TCP_DELAY_MS}
    depends_on:
      - redis
      - vector-tls-client
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/v1/health', r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  proxy:
    image: caddy:2
    restart: unless-stopped
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "${PROXY_HTTP_PORT:-80}:80"
      - "${PROXY_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - gateway

volumes:
  pgdata:
    name: supavector_pgdata
  vector_data:
    name: supavector_vector_data
  caddy_data:
    name: supavector_caddy_data
  caddy_config:
    name: supavector_caddy_config
