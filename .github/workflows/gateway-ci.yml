name: Gateway CI

concurrency:
  group: gateway-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  gateway-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare CI env file
        run: |
          cp .env.example .env.ci
          cat >> .env.ci << 'EOF'
          POSTGRES_PASSWORD=supavector
          OPENAI_API_KEY=
          JWT_SECRET=ci_jwt_secret
          COOKIE_SECRET=ci_cookie_secret
          COOKIE_SECURE=0
          PUBLIC_BASE_URL=http://localhost:3000
          OPENAPI_BASE_URL=http://localhost:3000
          MIGRATIONS_ATTEMPTS=30
          MIGRATIONS_DELAY_MS=1000
          RATE_LIMIT_MAX=500
          TENANT_RATE_LIMIT_MAX=500
          LOGIN_RATE_LIMIT_MAX=200
          AUTH_MAX_ATTEMPTS=20
          AUTH_LOCK_MINUTES=1
          REINDEX_ON_START=auto
          ALLOW_PRINCIPAL_OVERRIDE=0
          TELEMETRY_ENABLED=0
          FETCH_USER_AGENT=supavector-ci
          EOF

      - name: Run gateway CI flow
        run: |
          ENV_FILE=.env.ci \
          DOWN_ON_SUCCESS=1 \
          DOWN_ON_FAIL=1 \
          ./scripts/test_ci_local.sh

      - name: Print service logs on failure
        if: failure()
        run: docker compose --env-file .env.ci logs --no-color || true

      - name: Stop services
        if: always()
        run: docker compose --env-file .env.ci down -v --remove-orphans || true

  quickstart-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare quickstart env file
        run: |
          cp .env.example .env.quickstart.ci
          cat >> .env.quickstart.ci << 'EOF'
          POSTGRES_PASSWORD=supavector
          JWT_SECRET=ci_jwt_secret
          COOKIE_SECRET=ci_cookie_secret
          PUBLIC_BASE_URL=http://localhost:3000
          OPENAPI_BASE_URL=http://localhost:3000
          EOF

      - name: Run quickstart smoke flow
        run: |
          ENV_FILE=.env.quickstart.ci \
          DOWN_ON_SUCCESS=1 \
          DOWN_ON_FAIL=1 \
          ./scripts/test_quickstart_ci_local.sh

      - name: Print service logs on failure
        if: failure()
        run: docker compose --env-file .env.quickstart.ci logs --no-color || true

      - name: Stop services
        if: always()
        run: docker compose --env-file .env.quickstart.ci down -v --remove-orphans || true

  oss-public-checkout-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Run OSS no-git smoke target
        run: npm run test:oss-smoke
